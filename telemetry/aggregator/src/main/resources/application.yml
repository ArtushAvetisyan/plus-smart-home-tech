spring:
  main:
    web-application-type: none

  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: aggregator-v1
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: ru.yandex.practicum.telemetry.deserialization.SensorEventDeserializer
      enable-auto-commit: false

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: ru.yandex.practicum.telemetry.serialization.GeneralAvroSerializer

app:
  kafka:
    topics:
      sensor: "telemetry.sensors.v1"
      snapshot: "telemetry.snapshots.v1"