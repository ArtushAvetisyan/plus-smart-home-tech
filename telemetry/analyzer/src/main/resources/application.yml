spring:
  main:
    web-application-type: none

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: admin
    password: admin

  jpa:
    hibernate:
      ddl-auto: update

analyzer:
  kafka:
    hub-consumer:
      group-id: analyzer-hub-v1
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: ru.yandex.practicum.telemetry.deserialization.HubEventDeserializer

    snapshot-consumer:
      group-id: analyzer-snapshot-v1
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: ru.yandex.practicum.telemetry.deserialization.SnapshotDeserializer
      enable:
        auto:
          commit: false

app:
  kafka:
    topics:
      hub: "telemetry.hubs.v1"
      snapshot: "telemetry.snapshots.v1"

grpc:
  client:
    hub-router:
      address: 'static://localhost:59090'
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext